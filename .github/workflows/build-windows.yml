name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare neonize native library
        working-directory: agent
        env:
          SPHINX: "1"
        run: |
          python -c "from neonize.download import download; download()"

      - name: Build with PyInstaller
        working-directory: agent
        env:
          # Prevent neonize from loading its native WhatsApp DLL while
          # PyInstaller is only analyzing imports. Runtime loads normally.
          SPHINX: "1"
        run: pyinstaller wira-win.spec --clean --noconfirm

      - name: Create installer with Inno Setup
        working-directory: agent
        run: |
          choco install innosetup -y
          iscc wira-installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wira-windows
          path: agent/dist/WiraSetup.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/dist/WiraSetup.exe
