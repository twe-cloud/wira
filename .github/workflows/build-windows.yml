name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build bundled Windows app directory
        working-directory: agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/Wira/python, dist/Wira/app, dist/Wira/app_lib
          robocopy $env:pythonLocation dist/Wira/python /E /XD __pycache__ /XF *.pyc
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 } else { exit $LASTEXITCODE }

          pip install -r requirements.txt --target dist/Wira/app_lib
          Copy-Item *.py dist/Wira/app/
          Copy-Item .env.example, requirements.txt, wira-icon.ico dist/Wira/app/
          curl.exe -L --fail --retry 3 --connect-timeout 20 --max-time 120 -o dist/Wira/app_lib/neonize/neonize-windows-amd64.dll https://github.com/krypton-byte/neonize/releases/download/0.3.18.post0/neonize-windows-amd64.dll

          @'
          import os
          import runpy
          import sys
          from pathlib import Path

          app_dir = Path(__file__).resolve().parent
          root = app_dir.parent
          sys.path.insert(0, str(root / "app_lib"))
          sys.path.insert(0, str(app_dir))
          os.chdir(app_dir)
          runpy.run_path(str(app_dir / "gui.py"), run_name="__main__")
          '@ | Set-Content -Encoding UTF8 dist/Wira/app/wira_launcher.py

      - name: Create installer with Inno Setup
        working-directory: agent
        run: |
          choco install innosetup -y
          iscc wira-installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wira-windows
          path: agent/dist/WiraSetup.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/dist/WiraSetup.exe
