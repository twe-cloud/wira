name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # neonize is pinned in agent/requirements.txt. The native Windows DLL is
  # downloaded from the matching upstream release and verified by SHA-256, so a
  # compromised/replaced upstream asset fails the build instead of being signed
  # and shipped. Bump the version and the hash together.
  NEONIZE_VERSION: "0.3.18.post0"
  NEONIZE_DLL_SHA256: "0558a8af29c683c8ea537fa10751d8b08e81726109c94c950b84c3dd1047eade"
  INNO_SETUP_VERSION: "6.4.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # Actions pinned to commit SHAs (not mutable tags) for supply-chain safety.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build bundled Windows app directory
        working-directory: agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/Wira/python, dist/Wira/app, dist/Wira/app_lib
          robocopy $env:pythonLocation dist/Wira/python /E /XD __pycache__ /XF *.pyc
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 } else { exit $LASTEXITCODE }

          pip install -r requirements.txt --target dist/Wira/app_lib
          Copy-Item *.py dist/Wira/app/
          Copy-Item .env.example, requirements.txt, wira-icon.ico dist/Wira/app/

          # The native Windows DLL must match the EXACT neonize version pinned in
          # requirements.txt. Confirm pip resolved that version, then download and
          # verify the DLL by SHA-256 before bundling — so a tampered or swapped
          # upstream asset fails the build rather than getting signed and shipped.
          $resolved = (pip show neonize | Select-String '^Version:').Line.Split(':', 2)[1].Trim()
          if ($resolved -ne $env:NEONIZE_VERSION) {
            Write-Error "neonize version drift: resolved '$resolved' but expected '$($env:NEONIZE_VERSION)'. Update requirements.txt and NEONIZE_DLL_SHA256 together."
            exit 1
          }
          $dllUrl = "https://github.com/krypton-byte/neonize/releases/download/$($env:NEONIZE_VERSION)/neonize-windows-amd64.dll"
          $dllPath = "dist/Wira/app_lib/neonize/neonize-windows-amd64.dll"
          Write-Host "Downloading neonize Windows DLL $($env:NEONIZE_VERSION)"
          curl.exe -L --fail --retry 3 --connect-timeout 20 --max-time 120 -o $dllPath $dllUrl

          $actual = (Get-FileHash -Algorithm SHA256 $dllPath).Hash.ToLower()
          $expected = $env:NEONIZE_DLL_SHA256.ToLower()
          if ($actual -ne $expected) {
            Write-Error "neonize DLL checksum mismatch! expected $expected got $actual"
            exit 1
          }
          Write-Host "neonize DLL checksum verified."

          @'
          import os
          import runpy
          import sys
          from pathlib import Path

          app_dir = Path(__file__).resolve().parent
          root = app_dir.parent
          sys.path.insert(0, str(root / "app_lib"))
          sys.path.insert(0, str(app_dir))
          os.chdir(app_dir)
          runpy.run_path(str(app_dir / "gui.py"), run_name="__main__")
          '@ | Set-Content -Encoding UTF8 dist/Wira/app/wira_launcher.py

      - name: Create installer with Inno Setup
        working-directory: agent
        shell: pwsh
        run: |
          choco install innosetup --version=$env:INNO_SETUP_VERSION -y --no-progress
          iscc wira-installer.iss

      # Authenticode signing via Azure Trusted Signing. Inert until the org's
      # signing secrets are registered (Azure org identity validation is being
      # provisioned out-of-band). When the secrets land this signs WiraSetup.exe
      # automatically and the site can drop the unsigned-beta SmartScreen note.
      - name: Check signing configured
        id: signing
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && [ -n "${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets not configured — shipping unsigned (early beta)."
          fi

      - name: Sign installer (Azure Trusted Signing)
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/agent/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wira-windows
          path: agent/dist/WiraSetup.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: agent/dist/WiraSetup.exe
